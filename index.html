<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="theme-color" content="#1B2A4A" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#131417" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S300 Глоссарий">
<meta name="description" content="Англо-русский глоссарий технических терминов по электрическим схемам S300 (228 терминов)">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="./pwa/favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="./pwa/icon-192.png">
<link rel="apple-touch-icon" href="./pwa/apple-touch-icon.png">
<title>Глоссарий · S300 Электросхемы · EN→RU</title>
<style>
:root {
  --primary: #1B2A4A;
  --primary-light: #D6E4F0;
  --accent: #2E6FB5;
  --accent-warm: #B85C1E;
  --accent-green: #1B7D46;
  --bg: #FAFAF9;
  --card-bg: #FFFFFF;
  --text: #1F1E1B;
  --text-muted: #6B6963;
  --border: #E9E9E8;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.10);
  --radius: 12px;
  --header-h: 132px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

[data-theme="dark"] {
  --primary: #4F7CB8;
  --primary-light: #1E2D45;
  --accent: #6FA0DC;
  --accent-warm: #D88B4F;
  --accent-green: #4CAF50;
  --bg: #131417;
  --card-bg: #1C1E22;
  --text: #E8E6E0;
  --text-muted: #98958C;
  --border: #2A2D33;
  --shadow: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto",
               "Helvetica Neue", Arial, "Noto Sans", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  transition: background 0.25s, color 0.25s;
  padding-bottom: var(--safe-bottom);
}

/* === Header === */
.app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--primary);
  color: #fff;
  padding: calc(12px + var(--safe-top)) 14px 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 10px;
}

.app-title {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.01em;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.app-title .sub {
  display: block;
  font-size: 11px;
  font-weight: 400;
  opacity: 0.78;
  margin-top: 2px;
}

.icon-btn {
  background: rgba(255,255,255,0.13);
  border: 0;
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, transform 0.15s;
  flex-shrink: 0;
  position: relative;
}
.icon-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.25); }
.icon-btn.active { background: var(--accent-warm); }
.icon-btn .badge {
  position: absolute;
  top: -2px;
  right: -2px;
  background: var(--accent-warm);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
  border: 2px solid var(--primary);
  display: none;
}
.icon-btn .badge.show { display: flex; }

/* Search */
.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-wrap::before {
  content: "🔍";
  position: absolute;
  left: 12px;
  font-size: 14px;
  opacity: 0.65;
  pointer-events: none;
}
#search {
  width: 100%;
  padding: 11px 38px 11px 36px;
  font-size: 16px;  /* 16px prevents iOS auto-zoom */
  border: 0;
  border-radius: 22px;
  background: rgba(255,255,255,0.92);
  color: #1F1E1B;
  -webkit-appearance: none;
  outline: none;
}
#search::placeholder { color: #888; }
#search:focus { background: #fff; box-shadow: 0 0 0 3px rgba(255,255,255,0.25); }
.clear-search {
  position: absolute;
  right: 8px;
  background: transparent;
  border: 0;
  color: #888;
  font-size: 18px;
  width: 28px;
  height: 28px;
  cursor: pointer;
  border-radius: 50%;
  display: none;
}
.clear-search.show { display: flex; align-items: center; justify-content: center; }
.clear-search:active { background: rgba(0,0,0,0.08); }

/* Alphabet */
.alphabet {
  position: sticky;
  top: var(--header-h);
  z-index: 90;
  background: var(--bg);
  display: flex;
  overflow-x: auto;
  gap: 4px;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.alphabet::-webkit-scrollbar { display: none; }

.alpha-btn {
  flex-shrink: 0;
  min-width: 32px;
  height: 32px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  color: var(--text-muted);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 0 6px;
  transition: all 0.15s;
}
.alpha-btn:active { transform: scale(0.94); }
.alpha-btn.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.alpha-btn .count {
  font-size: 10px;
  font-weight: 400;
  margin-left: 2px;
  opacity: 0.7;
}

/* Filter toggle: words only / phrases only / all */
.filter-tabs {
  display: flex;
  gap: 6px;
  padding: 8px 12px 4px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}
.filter-tab {
  flex: 1;
  background: var(--card-bg);
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 8px 6px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-tab:active { transform: scale(0.97); }
.filter-tab.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}
.filter-tab .count {
  font-size: 11px;
  opacity: 0.7;
  margin-left: 2px;
}

/* === Main content === */
main {
  padding: 14px 12px 80px;
  max-width: 760px;
  margin: 0 auto;
}

.section-letter {
  position: sticky;
  top: 80px;
  z-index: 80;
  background: var(--bg);
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
  padding: 14px 4px 8px;
  margin: 0;
  letter-spacing: -0.02em;
  border-bottom: 2px solid var(--primary);
  margin-bottom: 10px;
}

.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 14px 14px 12px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, transform 0.15s;
  border: 1px solid var(--border);
  position: relative;
}
.card:active { transform: scale(0.99); box-shadow: var(--shadow-hover); }

.card-en {
  font-size: 17px;
  font-weight: 600;
  color: var(--accent);
  margin: 0 0 4px;
  line-height: 1.3;
  padding-right: 64px;
  word-break: break-word;
}
.card-en .tag {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  background: var(--primary-light);
  color: var(--primary);
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
  vertical-align: middle;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.card-en .tag.phrase { background: #FFE0B2; color: #8B4513; }
[data-theme="dark"] .card-en .tag { background: rgba(79,124,184,0.25); color: var(--accent); }
[data-theme="dark"] .card-en .tag.phrase { background: rgba(216,139,79,0.25); color: var(--accent-warm); }

.card-ru {
  font-size: 15px;
  color: var(--text);
  margin: 0 0 8px;
  line-height: 1.45;
}

.card-ctx {
  font-size: 13px;
  color: var(--text-muted);
  margin: 0;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  line-height: 1.4;
}
.card-ctx::before { content: "📄 "; margin-right: 2px; }

/* Component breakdown (expandable) */
.components {
  margin-top: 8px;
  font-size: 13px;
  display: none;
}
.components.show { display: block; }
.components-toggle {
  background: transparent;
  border: 0;
  color: var(--accent);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  padding: 4px 0;
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.components-toggle:active { transform: scale(0.97); }
.components-toggle .arrow {
  display: inline-block;
  transition: transform 0.2s;
}
.components-toggle.open .arrow { transform: rotate(90deg); }

.components-list {
  list-style: none;
  padding: 8px 0 0;
  margin: 0;
}
.components-list li {
  padding: 4px 0;
  border-bottom: 1px dashed var(--border);
  display: flex;
  gap: 8px;
  align-items: baseline;
  font-size: 13px;
}
.components-list li:last-child { border-bottom: 0; }
.components-list .comp-en {
  color: var(--accent);
  font-weight: 600;
  min-width: 90px;
  flex-shrink: 0;
}
.components-list .comp-arrow {
  color: var(--text-muted);
  font-size: 11px;
}
.components-list .comp-ru {
  color: var(--text);
  flex: 1;
}

/* Bookmark button */
.bookmark-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: transparent;
  border: 0;
  font-size: 18px;
  color: var(--text-muted);
  cursor: pointer;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.5;
  transition: opacity 0.15s, transform 0.15s;
}
.card:hover .bookmark-btn { opacity: 0.9; }
.bookmark-btn:active { transform: scale(0.85); }
.bookmark-btn.active { opacity: 1; color: var(--accent-warm); }

/* Empty state */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 15px;
}
.empty .icon { font-size: 48px; margin-bottom: 10px; opacity: 0.5; }

/* Stats banner */
.stats {
  text-align: center;
  padding: 8px 0 14px;
  color: var(--text-muted);
  font-size: 13px;
}
.stats b { color: var(--primary); }

/* Back to top */
.fab {
  position: fixed;
  bottom: calc(18px + var(--safe-bottom));
  right: 18px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: 0;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.25s, transform 0.25s;
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fab.show { opacity: 1; transform: translateY(0); }
.fab:active { transform: scale(0.92); }

/* Filter chip */
.filter-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--primary-light);
  color: var(--primary);
  padding: 6px 12px;
  border-radius: 14px;
  font-size: 13px;
  margin: 8px 0 0;
  font-weight: 500;
}
.filter-chip button {
  background: transparent;
  border: 0;
  color: inherit;
  font-size: 16px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
}

/* Install banner */
.install-banner {
  position: fixed;
  bottom: calc(18px + var(--safe-bottom));
  left: 18px;
  right: 78px;
  background: var(--primary);
  color: #fff;
  padding: 12px 14px;
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  z-index: 250;
  display: none;
  align-items: center;
  gap: 10px;
  font-size: 14px;
}
.install-banner.show { display: flex; }
.install-banner .icon { font-size: 24px; flex-shrink: 0; }
.install-banner .text { flex: 1; min-width: 0; }
.install-banner .text b { display: block; font-size: 14px; margin-bottom: 2px; }
.install-banner .text small { opacity: 0.85; font-size: 12px; }
.install-banner button {
  background: var(--accent-warm);
  color: #fff;
  border: 0;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}
.install-banner .close-x {
  background: transparent;
  padding: 4px 8px;
  font-size: 18px;
  color: rgba(255,255,255,0.7);
}

/* Larger screens: 2-column */
@media (min-width: 640px) {
  main { padding: 16px 16px 80px; }
  .cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-items: start;
  }
  .card { margin-bottom: 0; }
  .section-letter { grid-column: 1 / -1; }
}
@media (min-width: 900px) {
  .cards-grid { grid-template-columns: 1fr 1fr 1fr; }
  :root { --header-h: 138px; }
}

/* Highlight matched text */
mark {
  background: #FFE082;
  color: inherit;
  padding: 0 2px;
  border-radius: 3px;
}
[data-theme="dark"] mark { background: #6B5413; color: #FFE082; }

/* Toast notifications */
.toast {
  position: fixed;
  bottom: calc(80px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 10px 16px;
  border-radius: 24px;
  font-size: 13px;
  z-index: 300;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body data-theme="light">

<header class="app-header">
  <div class="header-top">
    <div class="app-title">
      Глоссарий · EN → RU
      <span class="sub" id="subTitle">S300 Электросхемы · загрузка…</span>
    </div>
    <button class="icon-btn" id="bookmarksToggle" title="Закладки">
      ★<span class="badge" id="bmBadge">0</span>
    </button>
    <button class="icon-btn" id="themeToggle" title="Тема">◐</button>
  </div>
  <div class="search-wrap">
    <input id="search" type="search" inputmode="search"
           placeholder="Поиск по слову, переводу или контексту…" autocomplete="off">
    <button class="clear-search" id="clearSearch" title="Очистить">×</button>
  </div>
</header>

<nav class="alphabet" id="alphabet"></nav>

<div class="filter-tabs">
  <button class="filter-tab active" data-filter="all">Все <span class="count" id="cnt-all">0</span></button>
  <button class="filter-tab" data-filter="word">Слова <span class="count" id="cnt-word">0</span></button>
  <button class="filter-tab" data-filter="phrase">Словосочетания <span class="count" id="cnt-phrase">0</span></button>
</div>

<main>
  <div class="stats" id="stats"></div>
  <div id="filterInfo"></div>
  <div class="cards-grid" id="list"></div>
</main>

<button class="fab" id="toTop" title="Наверх">↑</button>

<div class="install-banner" id="installBanner">
  <span class="icon">📲</span>
  <div class="text">
    <b>Установить как приложение</b>
    <small>Работает офлайн, быстрый доступ с домашнего экрана</small>
  </div>
  <button id="installBtn">Установить</button>
  <button class="close-x" id="installClose">×</button>
</div>

<div class="toast" id="toast"></div>

<script>

// === Helpers ===
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function highlight(text, query) {
  if (!query) return escapeHtml(text);
  const safe = escapeHtml(text);
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function getLetter(term) {
  // Use first alphabetic char (skip non-letters)
  const m = term.match(/[A-Za-zА-Яа-я]/);
  return m ? m[0].toUpperCase() : '#';
}

function isPhrase(term) {
  return term.trim().includes(' ');
}

function showToast(msg, duration = 2200) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => $toast.classList.remove('show'), duration);
}

// === Alphabet ===
function buildAlphabet() {
  const letters = [...new Set(DATA.map(d => getLetter(d.en)))].sort();
  $alphabet.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'alpha-btn active';
  allBtn.dataset.letter = '*';
  allBtn.textContent = 'Все';
  $alphabet.appendChild(allBtn);
  letters.forEach(L => {
    const cnt = DATA.filter(d => getLetter(d.en) === L).length;
    const btn = document.createElement('button');
    btn.className = 'alpha-btn';
    btn.dataset.letter = L;
    btn.innerHTML = L + '<span class="count">' + cnt + '</span>';
    $alphabet.appendChild(btn);
  });
  $alphabet.addEventListener('click', e => {
    const btn = e.target.closest('.alpha-btn');
    if (!btn) return;
    $alphabet.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLetter = btn.dataset.letter === '*' ? null : btn.dataset.letter;
    onlyBookmarks = false;
    $bmToggle.classList.remove('active');
    render();
  });
}

// === Filter tabs (word/phrase) ===
function setupFilterTabs() {
  const wordCount = DATA.filter(d => !isPhrase(d.en)).length;
  const phraseCount = DATA.filter(d => isPhrase(d.en)).length;
  document.getElementById('cnt-all').textContent = DATA.length;
  document.getElementById('cnt-word').textContent = wordCount;
  document.getElementById('cnt-phrase').textContent = phraseCount;
  
  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      typeFilter = tab.dataset.filter;
      render();
    });
  });
}

// === Render ===
function render() {
  let filtered = DATA;
  
  // Type filter
  if (typeFilter === 'word') {
    filtered = filtered.filter(d => !isPhrase(d.en));
  } else if (typeFilter === 'phrase') {
    filtered = filtered.filter(d => isPhrase(d.en));
  }
  
  // Bookmarks filter
  if (onlyBookmarks) {
    filtered = filtered.filter(d => bookmarks.has(d.en));
  }
  
  // Letter filter
  if (currentLetter) {
    filtered = filtered.filter(d => getLetter(d.en) === currentLetter);
  }
  
  // Search
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(d =>
      d.en.toLowerCase().includes(q) ||
      d.ru.toLowerCase().includes(q) ||
      d.ctx.toLowerCase().includes(q) ||
      (d.comp && d.comp.some(c => c[0].toLowerCase().includes(q) || c[1].toLowerCase().includes(q)))
    );
  }
  
  // Stats
  $stats.innerHTML = 'Показано <b>' + filtered.length + '</b> из <b>' + DATA.length + '</b> терминов' +
    (bookmarks.size > 0 ? ' · ★ ' + bookmarks.size + ' в закладках' : '');
  
  // Bookmark badge
  $bmBadge.textContent = bookmarks.size;
  $bmBadge.classList.toggle('show', bookmarks.size > 0);
  
  // Filter info chip
  let filterHtml = '';
  if (onlyBookmarks || currentLetter || typeFilter !== 'all') {
    filterHtml = '<div class="filter-chip">';
    const parts = [];
    if (onlyBookmarks) parts.push('★ Закладки');
    if (typeFilter === 'word') parts.push('Только слова');
    if (typeFilter === 'phrase') parts.push('Только словосочетания');
    if (currentLetter) parts.push('Буква ' + currentLetter);
    filterHtml += parts.join(' · ');
    filterHtml += ' <button id="clearFilter">×</button></div>';
  }
  $filterInfo.innerHTML = filterHtml;
  const $cf = document.getElementById('clearFilter');
  if ($cf) {
    $cf.addEventListener('click', () => {
      onlyBookmarks = false;
      currentLetter = null;
      typeFilter = 'all';
      $bmToggle.classList.remove('active');
      $alphabet.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
      $alphabet.querySelector('[data-letter="*"]').classList.add('active');
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.filter-tab[data-filter="all"]').classList.add('active');
      render();
    });
  }
  
  if (filtered.length === 0) {
    $list.innerHTML = '<div class="empty"><div class="icon">🔍</div>Ничего не найдено.<br>Попробуйте изменить запрос или сбросить фильтры.</div>';
    return;
  }
  
  // Group by letter
  const groups = {};
  filtered.forEach(d => {
    const L = getLetter(d.en);
    if (!groups[L]) groups[L] = [];
    groups[L].push(d);
  });
  
  let html = '';
  Object.keys(groups).sort().forEach(L => {
    html += '<h2 class="section-letter" id="letter-' + L + '">' + L + '</h2>';
    groups[L].forEach(d => {
      const isBm = bookmarks.has(d.en);
      const isPhr = isPhrase(d.en);
      const tag = isPhr
        ? '<span class="tag phrase">словосочетание</span>'
        : '<span class="tag">слово</span>';
      const compBtn = (d.comp && d.comp.length > 0) ? `
        <button class="components-toggle" data-term="${escapeHtml(d.en)}">
          <span class="arrow">▶</span> Разбор компонентов (${d.comp.length})
        </button>
        <div class="components" id="comp-${escapeHtml(d.en).replace(/[^a-z0-9]/gi, '_')}">
          <ul class="components-list">
            ${d.comp.map(c => `
              <li>
                <span class="comp-en">${highlight(c[0], searchQuery)}</span>
                <span class="comp-arrow">→</span>
                <span class="comp-ru">${highlight(c[1], searchQuery)}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      ` : '';
      html += `
        <article class="card">
          <button class="bookmark-btn ${isBm ? 'active' : ''}" data-term="${escapeHtml(d.en)}" title="В закладки">${isBm ? '★' : '☆'}</button>
          <h3 class="card-en">${highlight(d.en, searchQuery)} ${tag}</h3>
          <p class="card-ru">${highlight(d.ru, searchQuery)}</p>
          <p class="card-ctx">${highlight(d.ctx, searchQuery)}</p>
          ${compBtn}
        </article>
      `;
    });
  });
  $list.innerHTML = html;
  
  // Bookmark events
  $list.querySelectorAll('.bookmark-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const term = btn.dataset.term;
      if (bookmarks.has(term)) {
        bookmarks.delete(term);
        btn.classList.remove('active');
        btn.textContent = '☆';
        showToast('Удалено из закладок');
      } else {
        bookmarks.add(term);
        btn.classList.add('active');
        btn.textContent = '★';
        showToast('Добавлено в закладки');
      }
      localStorage.setItem(STORAGE_BOOKMARKS, JSON.stringify([...bookmarks]));
      $bmBadge.textContent = bookmarks.size;
      $bmBadge.classList.toggle('show', bookmarks.size > 0);
      if (onlyBookmarks) render();
    });
  });
  
  // Components toggle
  $list.querySelectorAll('.components-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const term = btn.dataset.term;
      const id = 'comp-' + term.replace(/[^a-z0-9]/gi, '_');
      const $comp = document.getElementById(id);
      const isOpen = btn.classList.toggle('open');
      $comp.classList.toggle('show', isOpen);
      btn.querySelector('.arrow').textContent = isOpen ? '▼' : '▶';
    });
  });
}

// === Search ===
$search.addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  $clear.classList.toggle('show', !!searchQuery);
  render();
});
$clear.addEventListener('click', () => {
  $search.value = '';
  searchQuery = '';
  $clear.classList.remove('show');
  $search.focus();
  render();
});

// === Theme ===
function setTheme(t) {
  document.body.dataset.theme = t;
  localStorage.setItem(STORAGE_THEME, t);
  $themeToggle.textContent = t === 'dark' ? '☀' : '◐';
  const themeColor = t === 'dark' ? '#131417' : '#1B2A4A';
  document.querySelectorAll('meta[name="theme-color"]').forEach(m => m.setAttribute('content', themeColor));
}
const savedTheme = localStorage.getItem(STORAGE_THEME)
  || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
setTheme(savedTheme);
$themeToggle.addEventListener('click', () => {
  setTheme(document.body.dataset.theme === 'dark' ? 'light' : 'dark');
});

// === Bookmarks filter ===
$bmToggle.addEventListener('click', () => {
  if (bookmarks.size === 0) {
    showToast('Закладок пока нет. Нажмите ☆ на карточке термина.');
    return;
  }
  onlyBookmarks = !onlyBookmarks;
  $bmToggle.classList.toggle('active', onlyBookmarks);
  if (onlyBookmarks) {
    $alphabet.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
    $alphabet.querySelector('[data-letter="*"]').classList.add('active');
    currentLetter = null;
  }
  render();
});

// === Back to top ===
window.addEventListener('scroll', () => {
  $toTop.classList.toggle('show', window.scrollY > 400);
}, { passive: true });
$toTop.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// === Keyboard shortcuts ===
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== $search) {
    e.preventDefault();
    $search.focus();
  }
  if (e.key === 'Escape') {
    if (document.activeElement === $search) {
      $search.blur();
    }
  }
});

// === PWA: Service Worker registration ===
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[SW] registered, scope:', reg.scope);
        // Check for updates
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (nw) {
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                showToast('Доступна новая версия, обновляем…');
                nw.postMessage('SKIP_WAITING');
                setTimeout(() => window.location.reload(), 1000);
              }
            });
          }
        });
      })
      .catch(err => console.warn('[SW] registration failed:', err));
  });
}

// === PWA: install prompt ===
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const dismissed = localStorage.getItem(STORAGE_INSTALL_DISMISSED);
  if (!dismissed) {
    setTimeout(() => $installBanner.classList.add('show'), 1500);
  }
});

$installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) {
    showToast('Установка недоступна в этом браузере');
    return;
  }
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    showToast('Приложение установлено!');
  }
  deferredPrompt = null;
  $installBanner.classList.remove('show');
});

$installClose.addEventListener('click', () => {
  $installBanner.classList.remove('show');
  localStorage.setItem(STORAGE_INSTALL_DISMISSED, '1');
});

window.addEventListener('appinstalled', () => {
  $installBanner.classList.remove('show');
  showToast('Приложение установлено на устройство');
});

// === iOS detected → manual install instructions ===
function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
}
if (isIOS() && !isStandalone()) {
  const dismissed = localStorage.getItem(STORAGE_INSTALL_DISMISSED);
  if (!dismissed) {
    setTimeout(() => {
      showToast('📲 Чтобы установить на iPhone: «Поделиться» → «На экран Домой»', 5000);
    }, 2500);
  }
}

// === URL params (for shortcuts) ===
function handleUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const action = params.get('action');
  if (action === 'search') {
    setTimeout(() => $search.focus(), 300);
  } else if (action === 'bookmarks') {
    setTimeout(() => $bmToggle.click(), 300);
  }
}

// === Init ===
$subTitle.textContent = 'S300 Электросхемы · ' + DATA.length + ' терминов';
buildAlphabet();
setupFilterTabs();
render();
handleUrlParams();
</script>
</body>
</html>
